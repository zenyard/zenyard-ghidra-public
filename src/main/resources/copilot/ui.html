<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot</title>
  <link rel="stylesheet" href="ui.css" />
  <link rel="stylesheet" href="prism.css" />
</head>
<body data-theme="light">
  <div id="app" class="app">
    <header class="app-header">
      <div class="header-left">
        <div class="header-avatar" aria-hidden="true">
          <img class="avatar-logo" src="assets/Avatar.svg" alt="" />
        </div>
        <span class="header-title">Zenyard Copilot</span>
      </div>
      <div class="header-actions">
        <button id="clearBtn" class="header-btn icon" type="button" title="Clear chat">
          <span class="icon-wrap" aria-hidden="true">
            <img class="icon icon-light" src="assets/header_clear_light.svg" alt="" />
            <img class="icon icon-dark" src="assets/header_clear_dark.svg" alt="" />
          </span>
        </button>
        <button id="closeBtn" class="header-btn icon" type="button" title="Close" aria-label="Close">
          <span class="icon-wrap" aria-hidden="true">
            <svg class="icon icon-light" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M4 4L12 12" stroke="#0A0A0A" stroke-width="1.33333" stroke-linecap="round"/>
              <path d="M12 4L4 12" stroke="#0A0A0A" stroke-width="1.33333" stroke-linecap="round"/>
            </svg>
            <svg class="icon icon-dark" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M4 4L12 12" stroke="#F3F4F6" stroke-width="1.33333" stroke-linecap="round"/>
              <path d="M12 4L4 12" stroke="#F3F4F6" stroke-width="1.33333" stroke-linecap="round"/>
            </svg>
          </span>
        </button>
        <span id="statusPill" class="status-pill">Ready</span>
      </div>
    </header>

    <main id="chat" class="chat">
      <section id="emptyState" class="empty-state">
        <div class="empty-orb"></div>
        <h1 class="empty-title">Ask Copilot about this program</h1>
        <p class="empty-subtitle">
          Summaries, explanations, and navigation for the current analysis.
        </p>
        <div class="empty-actions">
          <button class="empty-chip" data-suggestion="Summarize what this function does.">
            Summarize this function
          </button>
          <button class="empty-chip" data-suggestion="Explain the control flow in this function.">
            Explain control flow
          </button>
          <button class="empty-chip" data-suggestion="Find where this function is called.">
            Find callers
          </button>
          <button class="empty-chip" data-suggestion="What does this program do overall?">
            Program overview
          </button>
        </div>
      </section>
    </main>

    <section id="todoSection" class="todo-section hidden">
      <div class="todo-header">
        <span class="todo-title">Task Progress</span>
        <button id="todoToggle" class="todo-toggle" type="button" title="Toggle task progress">
          <span class="todo-toggle-label">Hide</span>
        </button>
      </div>
      <div id="toolInfo" class="tool-info hidden">
        <div id="toolHistory" class="tool-history"></div>
      </div>
      <ul id="todoList" class="todo-list"></ul>
      <div id="subAgentBox" class="subagent-box hidden">
        <div class="subagent-header">
          <span class="subagent-label">Subagent stream</span>
          <span id="subAgentTypeName" class="subagent-type"></span>
        </div>
        <pre id="subAgentStream" class="subagent-stream"></pre>
      </div>
    </section>

    <div id="typingIndicator" class="typing hidden">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="typing-label">Thinking...</span>
    </div>

    <footer class="input-bar">
      <div id="input" class="input" contenteditable="true" role="textbox" aria-multiline="true"
        data-placeholder="Ask the Copilot..."></div>
      <div class="action-switch">
        <button id="stopBtn" class="btn btn-secondary btn-icon action-btn is-hidden" title="Stop" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="2"/>
            <rect x="5" y="5" width="6" height="6" fill="currentColor"/>
          </svg>
        </button>
        <button id="sendBtn" class="btn btn-primary send-button action-btn is-visible" title="Send" aria-hidden="false">
          <span class="icon-wrap" aria-hidden="true">
            <img class="icon icon-light" src="assets/send_light.svg" alt="" />
            <img class="icon icon-dark" src="assets/send_dark.svg" alt="" />
          </span>
          <span>Send</span>
        </button>
      </div>
    </footer>
  </div>
  <div id="dom-bridge" data-state="" data-payload="" hidden></div>

  <script src="vendor/marked.umd.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/prism.min.js"></script>
  <script src="vendor/prism-clike.min.js"></script>
  <script src="vendor/prism-c.min.js"></script>
  <script src="vendor/prism-cpp.min.js"></script>
  <script src="vendor/prism-java.min.js"></script>
  <script src="vendor/prism-python.min.js"></script>
  <script src="vendor/prism-json.min.js"></script>
  <script src="vendor/prism-bash.min.js"></script>
  <script src="vendor/prism-go.min.js"></script>
  <script src="vendor/prism-rust.min.js"></script>

  <script src="ui.js"></script>
</body>
</html>
