name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GHIDRA_VERSION: "12.0.4"
  GHIDRA_RELEASE: "PUBLIC"
  JAVAFX_PLATFORMS: "linux win mac mac-aarch64 linux-aarch64"

jobs:
  set-short-sha:
    name: Set short SHA
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.short.outputs.short_sha }}
      safe_ref: ${{ steps.safe-ref.outputs.safe_ref }}
    steps:
      - name: Compute short SHA
        id: short
        run: |
          SHORT_SHA="${GITHUB_SHA: -7}"
          SHORT_SHA="${SHORT_SHA//\"/}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
      - name: Sanitize ref name
        id: safe-ref
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          echo "safe_ref=$SAFE_REF" >> "$GITHUB_OUTPUT"

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: set-short-sha
    env:
      SHORT_SHA: ${{ needs.set-short-sha.outputs.short_sha }}
      SAFE_REF: ${{ needs.set-short-sha.outputs.safe_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Define GHIDRA_DIR
        run: |
          echo "GHIDRA_DIR=${RUNNER_TEMP}/ghidra_${GHIDRA_VERSION}_${GHIDRA_RELEASE}" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # --- GHIDRA: resolve exact build asset and cache by asset identity ---
      - name: Resolve Ghidra release asset
        id: ghidra-asset
        env:
          GHIDRA_TAG: Ghidra_${{ env.GHIDRA_VERSION }}_build
          GHIDRA_PREFIX: ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys, urllib.request

          tag = os.environ["GHIDRA_TAG"]
          prefix = os.environ["GHIDRA_PREFIX"]
          url = f"https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/tags/{tag}"

          req = urllib.request.Request(url, headers={"Accept": "application/vnd.github+json"})
          with urllib.request.urlopen(req) as resp:
            data = json.load(resp)

          assets = data.get("assets", [])
          matches = [
            a for a in assets
            if a.get("name","").startswith(prefix) and a.get("name","").endswith(".zip")
          ]
          matches.sort(key=lambda a: ((a.get("updated_at") or ""), (a.get("name") or "")))
          if not matches:
            print(f"Error: No asset matching {prefix}*.zip under release tag {tag}", file=sys.stderr)
            sys.exit(1)

          a = matches[-1]
          asset_id = a.get("id")
          asset_name = a.get("name")
          dl = a.get("browser_download_url")

          if not asset_id or not asset_name or not dl:
            print("Error: Missing id/name/download_url in matched asset", file=sys.stderr)
            sys.exit(1)

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as f:
            f.write(f"asset_id={asset_id}\n")
            f.write(f"asset_name={asset_name}\n")
            f.write(f"download_url={dl}\n")
          PY

      - name: Restore Ghidra cache
        id: cache-ghidra
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.GHIDRA_DIR }}
          key: ghidra-${{ runner.os }}-${{ steps.ghidra-asset.outputs.asset_id }}-${{ steps.ghidra-asset.outputs.asset_name }}
          restore-keys: |
            ghidra-${{ runner.os }}-

      - name: Download Ghidra (if not cached)
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "${GHIDRA_DIR}"
          cd "${GHIDRA_DIR}"

          GHIDRA_ZIP_URL="${{ steps.ghidra-asset.outputs.download_url }}"
          GHIDRA_ZIP="$(basename "${GHIDRA_ZIP_URL}")"

          echo "Downloading ${GHIDRA_ZIP_URL}"
          curl -fL --retry 3 --retry-delay 2 -o "${GHIDRA_ZIP}" "${GHIDRA_ZIP_URL}"

          unzip -tq "${GHIDRA_ZIP}"
          unzip -q "${GHIDRA_ZIP}"
          rm -f "${GHIDRA_ZIP}"

          EXTRACTED_DIR="$(find . -maxdepth 1 -type d -name 'ghidra_*' | head -1 || true)"
          if [ -n "${EXTRACTED_DIR}" ]; then
            shopt -s dotglob
            mv "${EXTRACTED_DIR}"/* .
            rmdir "${EXTRACTED_DIR}"
          fi

      - name: Save Ghidra cache (writer only)
        if: >
          steps.cache-ghidra.outputs.cache-hit != 'true' &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/cache/save@v4
        with:
          path: ${{ env.GHIDRA_DIR }}
          key: ghidra-${{ runner.os }}-${{ steps.ghidra-asset.outputs.asset_id }}-${{ steps.ghidra-asset.outputs.asset_name }}

      - name: Set Ghidra installation directory
        run: |
          echo "GHIDRA_INSTALL_DIR=${GHIDRA_DIR}" >> "$GITHUB_ENV"
          test -d "${GHIDRA_DIR}" || (echo "Error: ${GHIDRA_DIR} not found" && exit 1)

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain

      - name: Generate OpenAPI client
        run: ./gradlew openApiGenerate

      # Build one extension ZIP per target platform.
      # Each iteration passes -PjavafxPlatform=<platform> so only the matching
      # JavaFX classifier JARs end up in lib/. The produced ZIP is immediately
      # renamed to include the platform suffix before the next build overwrites it.
      - name: Build per-platform extension ZIPs
        run: |
          set -euo pipefail
          for platform in $JAVAFX_PLATFORMS; do
            echo ""
            echo "========== Building for platform: ${platform} =========="
            ./gradlew -PjavafxPlatform="${platform}" buildExtension

            SRC_ZIP=$(ls -t dist/ghidra_*_zenyard-ghidra.zip 2>/dev/null | head -1)
            if [ -z "$SRC_ZIP" ]; then
              echo "Error: No extension ZIP found in dist/ after building for ${platform}"
              exit 1
            fi

            DEST_ZIP="${SRC_ZIP%.zip}-${platform}.zip"
            mv "$SRC_ZIP" "$DEST_ZIP"
            echo "Produced: ${DEST_ZIP}"
          done

          echo ""
          echo "=== All platform ZIPs ==="
          ls -lh dist/*_zenyard-ghidra-*.zip

      - name: Upload artifact (linux)
        uses: actions/upload-artifact@v4
        with:
          name: zenyard-ghidra-linux-${{ env.SAFE_REF }}-${{ env.SHORT_SHA }}
          path: dist/*_zenyard-ghidra-linux.zip
          retention-days: 30

      - name: Upload artifact (win)
        uses: actions/upload-artifact@v4
        with:
          name: zenyard-ghidra-win-${{ env.SAFE_REF }}-${{ env.SHORT_SHA }}
          path: dist/*_zenyard-ghidra-win.zip
          retention-days: 30

      - name: Upload artifact (mac)
        uses: actions/upload-artifact@v4
        with:
          name: zenyard-ghidra-mac-${{ env.SAFE_REF }}-${{ env.SHORT_SHA }}
          path: dist/*_zenyard-ghidra-mac.zip
          retention-days: 30

      - name: Upload artifact (mac-aarch64)
        uses: actions/upload-artifact@v4
        with:
          name: zenyard-ghidra-mac-aarch64-${{ env.SAFE_REF }}-${{ env.SHORT_SHA }}
          path: dist/*_zenyard-ghidra-mac-aarch64.zip
          retention-days: 30

      - name: Upload artifact (linux-aarch64)
        uses: actions/upload-artifact@v4
        with:
          name: zenyard-ghidra-linux-aarch64-${{ env.SAFE_REF }}-${{ env.SHORT_SHA }}
          path: dist/*_zenyard-ghidra-linux-aarch64.zip
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [set-short-sha, build-and-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SHORT_SHA: ${{ needs.set-short-sha.outputs.short_sha }}
      SAFE_REF: ${{ needs.set-short-sha.outputs.safe_ref }}

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zenyard-ghidra-*-${{ env.SAFE_REF }}-${{ env.SHORT_SHA }}
          path: build-artifact
          merge-multiple: true

      - name: List extension ZIPs
        run: |
          echo "Extension ZIPs in artifact:"
          ls -lhR build-artifact/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build-artifact/*_zenyard-ghidra-*.zip
          tag_name: ci-${{ env.SHORT_SHA }}
          name: Zenyard Ghidra ci-${{ env.SHORT_SHA }}
          body: |
            CI release for `main` @ `${{ github.sha }}`.

            ## Platform ZIPs
            Each ZIP contains JavaFX native libraries for exactly one platform.
            Download the one matching your OS/architecture:
            - **Linux x64**: `*-linux.zip`
            - **Windows x64**: `*-win.zip`
            - **macOS Intel**: `*-mac.zip`
            - **macOS Apple Silicon**: `*-mac-aarch64.zip`
            - **Linux ARM64**: `*-linux-aarch64.zip`

            ## Enabling the Copilot Python Tool
            The Copilot includes a **Python script execution tool** (`run_python_script`) that gives the AI agent full access to the Ghidra API via Python. To enable it, launch Ghidra through PyGhidra using the provided script:
            ```
            ./support/pyghidraRun
            ```
            On first run, the script will offer to create a virtualenv with all required dependencies. If Ghidra is launched without PyGhidra, the Copilot will still work but the Python tool will be unavailable.

            ## Changes
            See the [commit log](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}) for details.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
