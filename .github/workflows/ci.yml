name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]

env:
  GHIDRA_VERSION: "12.0"
  GHIDRA_RELEASE: "PUBLIC"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Restore Ghidra cache
        id: cache-ghidra
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}
            $HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}
          key: ghidra-${{ env.GHIDRA_VERSION }}-${{ env.GHIDRA_RELEASE }}
          restore-keys: |
            ghidra-${{ env.GHIDRA_VERSION }}-

      - name: Download Ghidra (if not cached)
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        run: |
          # If GHIDRA_INSTALL_DIR is already set and valid, skip download
          if [ -n "${GHIDRA_INSTALL_DIR:-}" ] && [ -d "$GHIDRA_INSTALL_DIR" ]; then
            echo "Using GHIDRA_INSTALL_DIR=$GHIDRA_INSTALL_DIR"
            exit 0
          fi

          # Use HOME directory or toolCache
          if [ -n "${{ runner.toolCache }}" ]; then
            GHIDRA_DIR="${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
          else
            GHIDRA_DIR="$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
          fi
          mkdir -p "$GHIDRA_DIR"
          cd "$GHIDRA_DIR"

          GHIDRA_TAG="Ghidra_${{ env.GHIDRA_VERSION }}_build"
          GHIDRA_PREFIX="ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
          export GHIDRA_TAG GHIDRA_PREFIX

          GHIDRA_ZIP_URL=$(python -c "import json, os, urllib.request; tag=os.environ['GHIDRA_TAG']; prefix=os.environ['GHIDRA_PREFIX']; url=f'https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/tags/{tag}'; data=json.load(urllib.request.urlopen(url)); assets=data.get('assets', []); matches=[a for a in assets if a.get('name','').startswith(prefix) and a.get('name','').endswith('.zip')]; matches.sort(key=lambda a: a.get('name','')); print((matches[-1].get('browser_download_url','') if matches else ''), end='')")

          if [ -z "$GHIDRA_ZIP_URL" ]; then
            echo "Error: Could not find a matching Ghidra zip for $GHIDRA_PREFIX in $GHIDRA_TAG"
            exit 1
          fi

          GHIDRA_ZIP=$(basename "$GHIDRA_ZIP_URL")
          echo "Downloading $GHIDRA_ZIP_URL"
          curl -fL --retry 3 --retry-delay 2 -o "$GHIDRA_ZIP" "$GHIDRA_ZIP_URL"

          # Validate and extract
          unzip -tq "$GHIDRA_ZIP"
          unzip -q "$GHIDRA_ZIP"
          rm "$GHIDRA_ZIP"

          # Find the extracted directory
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "ghidra_*" | head -1)
          if [ -n "$EXTRACTED_DIR" ]; then
            mv "$EXTRACTED_DIR"/* .
            rmdir "$EXTRACTED_DIR"
          fi

      - name: Resolve Ghidra cache path
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        id: ghidra-cache-path
        run: |
          if [ -n "${{ runner.toolCache }}" ] && [ -d "${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "path=${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> "$GITHUB_OUTPUT"
          elif [ -d "$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "path=$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Save Ghidra cache
        if: steps.cache-ghidra.outputs.cache-hit != 'true' && steps.ghidra-cache-path.outputs.path != ''
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.ghidra-cache-path.outputs.path }}
          key: ghidra-${{ env.GHIDRA_VERSION }}-${{ env.GHIDRA_RELEASE }}

      - name: Set Ghidra installation directory
        run: |
          if [ -n "${GHIDRA_INSTALL_DIR:-}" ] && [ -d "$GHIDRA_INSTALL_DIR" ]; then
            echo "GHIDRA_INSTALL_DIR=$GHIDRA_INSTALL_DIR" >> $GITHUB_ENV
            exit 0
          fi

          if [ -n "${{ runner.toolCache }}" ] && [ -d "${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "GHIDRA_INSTALL_DIR=${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> $GITHUB_ENV
          elif [ -d "$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "GHIDRA_INSTALL_DIR=$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> $GITHUB_ENV
          else
            echo "Error: Ghidra installation not found"
            echo "Checked: ${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
            echo "Checked: $HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain

      - name: Generate OpenAPI client
        run: ./gradlew openApiGenerate

      - name: Build extension
        run: ./gradlew buildExtension

      - name: Set short SHA
        run: |
          SHORT_SHA="${GITHUB_SHA: -5}"
          SHORT_SHA="${SHORT_SHA//\"/}"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Get extension ZIP file
        id: get-zip
        run: |
          ZIP_FILE=$(ls -t dist/ghidra_*_decompai-ghidra.zip | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: No extension ZIP found in dist/"
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "Found ZIP file: $ZIP_FILE"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: decompai-ghidra-${{ github.ref_name }}-${{ env.SHORT_SHA }}
          path: ${{ steps.get-zip.outputs.zip_file }}
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Restore Ghidra cache
        id: cache-ghidra-release
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}
            $HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}
          key: ghidra-${{ env.GHIDRA_VERSION }}-${{ env.GHIDRA_RELEASE }}
          restore-keys: |
            ghidra-${{ env.GHIDRA_VERSION }}-

      - name: Download Ghidra (if not cached)
        if: steps.cache-ghidra-release.outputs.cache-hit != 'true'
        run: |
          # If GHIDRA_INSTALL_DIR is already set and valid, skip download
          if [ -n "${GHIDRA_INSTALL_DIR:-}" ] && [ -d "$GHIDRA_INSTALL_DIR" ]; then
            echo "Using GHIDRA_INSTALL_DIR=$GHIDRA_INSTALL_DIR"
            exit 0
          fi

          # Use HOME directory or toolCache
          if [ -n "${{ runner.toolCache }}" ]; then
            GHIDRA_DIR="${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
          else
            GHIDRA_DIR="$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
          fi
          mkdir -p "$GHIDRA_DIR"
          cd "$GHIDRA_DIR"

          GHIDRA_TAG="Ghidra_${{ env.GHIDRA_VERSION }}_build"
          GHIDRA_PREFIX="ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"

          GHIDRA_ZIP_URL=$(python -c "import json, os, urllib.request; tag=os.environ['GHIDRA_TAG']; prefix=os.environ['GHIDRA_PREFIX']; url=f'https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/tags/{tag}'; data=json.load(urllib.request.urlopen(url)); assets=data.get('assets', []); matches=[a for a in assets if a.get('name','').startswith(prefix) and a.get('name','').endswith('.zip')]; matches.sort(key=lambda a: a.get('name','')); print((matches[-1].get('browser_download_url','') if matches else ''), end='')")

          if [ -z "$GHIDRA_ZIP_URL" ]; then
            echo "Error: Could not find a matching Ghidra zip for $GHIDRA_PREFIX in $GHIDRA_TAG"
            exit 1
          fi

          GHIDRA_ZIP=$(basename "$GHIDRA_ZIP_URL")
          echo "Downloading $GHIDRA_ZIP_URL"
          curl -fL --retry 3 --retry-delay 2 -o "$GHIDRA_ZIP" "$GHIDRA_ZIP_URL"

          # Validate and extract
          unzip -tq "$GHIDRA_ZIP"
          unzip -q "$GHIDRA_ZIP"
          rm "$GHIDRA_ZIP"

          # Find the extracted directory
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "ghidra_*" | head -1)
          if [ -n "$EXTRACTED_DIR" ]; then
            mv "$EXTRACTED_DIR"/* .
            rmdir "$EXTRACTED_DIR"
          fi

      - name: Resolve Ghidra cache path
        if: steps.cache-ghidra-release.outputs.cache-hit != 'true'
        id: ghidra-cache-path-release
        run: |
          if [ -n "${{ runner.toolCache }}" ] && [ -d "${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "path=${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> "$GITHUB_OUTPUT"
          elif [ -d "$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "path=$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Save Ghidra cache
        if: steps.cache-ghidra-release.outputs.cache-hit != 'true' && steps.ghidra-cache-path-release.outputs.path != ''
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.ghidra-cache-path-release.outputs.path }}
          key: ghidra-${{ env.GHIDRA_VERSION }}-${{ env.GHIDRA_RELEASE }}

      - name: Set Ghidra installation directory
        run: |
          if [ -n "${GHIDRA_INSTALL_DIR:-}" ] && [ -d "$GHIDRA_INSTALL_DIR" ]; then
            echo "GHIDRA_INSTALL_DIR=$GHIDRA_INSTALL_DIR" >> $GITHUB_ENV
            exit 0
          fi

          if [ -n "${{ runner.toolCache }}" ] && [ -d "${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "GHIDRA_INSTALL_DIR=${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> $GITHUB_ENV
          elif [ -d "$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" ]; then
            echo "GHIDRA_INSTALL_DIR=$HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}" >> $GITHUB_ENV
          else
            echo "Error: Ghidra installation not found"
            echo "Checked: ${{ runner.toolCache }}/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
            echo "Checked: $HOME/ghidra_${{ env.GHIDRA_VERSION }}_${{ env.GHIDRA_RELEASE }}"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate OpenAPI client
        run: ./gradlew openApiGenerate

      - name: Build extension
        run: ./gradlew buildExtension

      - name: Get release ZIP file
        id: get-zip
        run: |
          ZIP_FILE=$(ls -t dist/ghidra_*_decompai-ghidra.zip | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: No extension ZIP found in dist/"
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "Found ZIP file: $ZIP_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.get-zip.outputs.zip_file }}
          tag_name: ${{ github.ref_name }}
          name: Decompai Ghidra {{VERSION_TAG}}
          body: |
            Release ${{ github.ref_name }}
            
            ## Changes
            See the [commit log](https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-commit-release:
    name: Publish Commit Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Set short SHA
        run: |
          SHORT_SHA="${GITHUB_SHA: -5}"
          SHORT_SHA="${SHORT_SHA//\"/}"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: decompai-ghidra-${{ github.ref_name }}-${{ env.SHORT_SHA }}
          path: build-artifact

      - name: Locate extension ZIP
        id: get-zip
        run: |
          ZIP_FILE=$(find build-artifact -name "ghidra_*_decompai-ghidra.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: No extension ZIP found in artifact"
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "Found ZIP file: $ZIP_FILE"

      - name: Publish commit release asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.get-zip.outputs.zip_file }}
          tag_name: ci-${{ github.ref_name }}
          name: CI Build (${{ github.ref_name }})
          body: |
            CI build for `${{ github.ref_name }}` at commit `${{ github.sha }}`.

            This release is updated on every push to main/develop.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
